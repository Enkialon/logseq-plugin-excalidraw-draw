name: Publish

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package plugin
        run: |
          mkdir package
          cp package.json package/
          cp README.md package/
          cp README.zh.md package/
          cp icon.svg package/
          cp -r dist package/
          cd package
          zip -r ../logseq-plugin-excalidraw-${{ github.ref_name }}.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: logseq-plugin-excalidraw-${{ github.ref_name }}.zip
